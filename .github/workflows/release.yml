name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release
  packages: write   # push to ghcr.io

jobs:
  release:
    name: Build, push, publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Build install manifest
        run: |
          IMG=$(echo "ghcr.io/${{ github.repository }}:${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]') \
            make build-installer

      - name: Package Helm chart
        run: |
          CHART_VERSION="${{ github.ref_name }}"
          CHART_VERSION="${CHART_VERSION#v}"
          helm package charts/node-maintenance-orchestrator \
            --version "${CHART_VERSION}" \
            --app-version "${{ github.ref_name }}" \
            --destination dist/

      - name: Push Helm chart to ghcr.io
        run: |
          CHART_VERSION="${{ github.ref_name }}"
          CHART_VERSION="${CHART_VERSION#v}"
          helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}"
          helm push "dist/node-maintenance-orchestrator-${CHART_VERSION}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/install.yaml
            dist/node-maintenance-orchestrator-*.tgz
          generate_release_notes: true

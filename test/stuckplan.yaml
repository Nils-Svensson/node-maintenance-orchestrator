apiVersion: maintenance.nmoo.io/v1alpha1
kind: NodeMaintenancePlan
metadata:
  name: stuck
spec:
  reason: "Planned maintenance"
  nodes: [kind-worker3]
  cordon:
    enabled: true
  drain: 
    enabled: true
    timeoutMinutes: 120
    options:
      maxParallel: 1
      force: true
      ignoreDaemonSets: true
      

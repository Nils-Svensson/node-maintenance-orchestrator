apiVersion: v1
kind: Pod
metadata:
  name: stuck-pod
  namespace: default
  finalizers:
    - maintenance.nmoo.io/test
spec:
  nodeName: kind-worker3
  terminationGracePeriodSeconds: 1
  containers:
  - name: pause
    image: busybox
    command: ["sleep", "infinity"]

--- 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 6
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      nodeSelector:
        kubernetes.io/hostname: kind-worker3
      terminationGracePeriodSeconds: 60
      containers:
      - name: myapp
        image: nginx:alpine
        lifecycle:
          preStop:
            exec:
              command: ["sleep", "45"]
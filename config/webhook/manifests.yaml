apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - name: vnodemaintenanceplan.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      # caBundle is intentionally empty — the operator patches it on startup.
      service:
        name: webhook-service
        namespace: nmo-system
        path: /validate-maintenance-nmoo-io-v1alpha1-nodemaintenanceplan
    rules:
      - apiGroups: ["maintenance.nmoo.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["nodemaintenanceplans"]
    # Ignore lets plans through if the webhook is unavailable. The reconciler
    # already handles ownership conflicts at runtime, so a missed admission
    # check is not a safety gap.
    failurePolicy: Ignore
    sideEffects: None
    timeoutSeconds: 10

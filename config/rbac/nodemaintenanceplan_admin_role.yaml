# This rule is not used by the project node-maintenance-orchestrator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over maintenance.nmoo.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: node-maintenance-orchestrator
    app.kubernetes.io/managed-by: kustomize
  name: nodemaintenanceplan-admin-role
rules:
- apiGroups:
  - maintenance.nmoo.io
  resources:
  - nodemaintenanceplans
  verbs:
  - '*'
- apiGroups:
  - maintenance.nmoo.io
  resources:
  - nodemaintenanceplans/status
  verbs:
  - get

---
# Permissions required for the operator's self-signed cert bootstrapper.
# Scoped to the specific webhook config name to limit blast radius.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: webhook-cert-role
rules:
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations"]
    resourceNames: ["node-maintenance-orchestrator-validating-webhook-configuration"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: webhook-cert-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: webhook-cert-role
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: system
---
# Secret access is namespace-scoped.
# create must be in a separate rule without resourceNames — Kubernetes RBAC does
# not evaluate resourceNames for create requests (the resource has no name yet).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: webhook-cert-secret-role
  namespace: system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["node-maintenance-orchestrator-webhook-cert"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webhook-cert-secret-rolebinding
  namespace: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: webhook-cert-secret-role
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: system

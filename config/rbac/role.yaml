---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - maintenance.nmoo.io
  resources:
  - nodemaintenanceplans
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - maintenance.nmoo.io
  resources:
  - nodemaintenanceplans/finalizers
  verbs:
  - update
- apiGroups:
  - maintenance.nmoo.io
  resources:
  - nodemaintenanceplans/status
  verbs:
  - get
  - patch
  - update

replicaCount: 2

image:
  repository: ghcr.io/nils-svensson/node-maintenance-orchestrator
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to the chart appVersion.
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Overrides the generated service account name.
  name: ""

leaderElection:
  enabled: true

webhook:
  enabled: true
  port: 9443
  # BYO cert: path inside the container to a directory containing tls.crt and tls.key.
  # When set, the operator skips self-signed cert bootstrap and uses these files directly.
  # You are responsible for mounting the cert files and keeping them rotated.
  # certPath: ""

metrics:
  enabled: true
  service:
    port: 8443
  # BYO cert: path inside the container to a directory containing tls.crt and tls.key.
  # When set, the operator skips self-signed cert bootstrap and uses these files directly.
  # You are responsible for mounting the cert files and keeping them rotated.
  # certPath: ""
  serviceMonitor:
    enabled: false
    interval: 15s
    # Set to true if your Prometheus pod cannot read Secrets in the operator namespace
    # (e.g. Prometheus lacks RBAC to get the CA secret). The bearer-token authn/authz
    # on the endpoint still protects against unauthorized access.
    insecureSkipVerify: false
    # additionalLabels: {}  # extra labels to add to the ServiceMonitor (e.g. for Prometheus selector)

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

# Pin operator pods to control-plane nodes. The operator mounts an emptyDir for
# TLS certs; if pods run on worker nodes they will block their own drain.
# Override if your distribution uses a different control-plane label.
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists

replicaCount: 2

image:
  repository: ghcr.io/nils-svensson/node-maintenance-orchestrator
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to the chart appVersion.
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Overrides the generated service account name.
  name: ""

leaderElection:
  enabled: true

metrics:
  enabled: true
  service:
    port: 8080
  serviceMonitor:
    enabled: false
    interval: 30s
    # additionalLabels: {}  # extra labels to add to the ServiceMonitor (e.g. for Prometheus selector)

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

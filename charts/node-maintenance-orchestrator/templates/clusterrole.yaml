apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nmo.fullname" . }}-manager-role
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
rules:
- apiGroups: ["", "events.k8s.io"]
  resources: [events]
  verbs: [create, patch]
- apiGroups: [""]
  resources: [nodes]
  verbs: [get, list, patch, update, watch]
- apiGroups: [""]
  resources: [pods]
  verbs: [delete, get, list, watch]
- apiGroups: [""]
  resources: [pods/eviction]
  verbs: [create]
- apiGroups: [maintenance.nmoo.io]
  resources: [nodemaintenanceplans]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [maintenance.nmoo.io]
  resources: [nodemaintenanceplans/finalizers]
  verbs: [update]
- apiGroups: [maintenance.nmoo.io]
  resources: [nodemaintenanceplans/status]
  verbs: [get, patch, update]
- apiGroups: [policy]
  resources: [poddisruptionbudgets]
  verbs: [list, watch]

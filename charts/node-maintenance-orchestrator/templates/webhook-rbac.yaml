{{- if .Values.webhook.enabled }}
# ClusterRole: get + patch the ValidatingWebhookConfiguration (caBundle rotation).
# Scoped to a single named resource to minimise blast radius.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nmo.fullname" . }}-webhook-config-role
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
rules:
  - apiGroups: [admissionregistration.k8s.io]
    resources: [validatingwebhookconfigurations]
    resourceNames: [{{ include "nmo.webhookConfigName" . | quote }}]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nmo.fullname" . }}-webhook-config-rolebinding
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nmo.fullname" . }}-webhook-config-role
subjects:
  - kind: ServiceAccount
    name: {{ include "nmo.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Role: get + create + patch the webhook CA Secret (cert bootstrap and rotation).
# create must be in a separate rule without resourceNames — Kubernetes RBAC does
# not evaluate resourceNames for create requests (the resource has no name yet).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nmo.fullname" . }}-webhook-cert-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create]
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [{{ include "nmo.webhookCertSecretName" . | quote }}]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nmo.fullname" . }}-webhook-cert-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nmo.fullname" . }}-webhook-cert-role
subjects:
  - kind: ServiceAccount
    name: {{ include "nmo.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

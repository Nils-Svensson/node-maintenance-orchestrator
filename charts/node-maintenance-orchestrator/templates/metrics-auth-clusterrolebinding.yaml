{{- if .Values.metrics.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nmo.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nmo.fullname" . }}-metrics-auth-role
subjects:
  - kind: ServiceAccount
    name: {{ include "nmo.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

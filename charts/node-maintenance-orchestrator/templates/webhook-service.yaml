{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nmo.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: {{ .Values.webhook.port }}
  selector:
    {{- include "nmo.selectorLabels" . | nindent 4 }}
{{- end }}

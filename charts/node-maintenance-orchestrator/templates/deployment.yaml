apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nmo.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nmo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- include "nmo.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nmo.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:8081
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.service.port }}
            - --metrics-secure=false
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - --webhook-enabled=true
            - --operator-namespace={{ .Release.Namespace }}
            - --webhook-service-name={{ include "nmo.webhookServiceName" . }}
            - --webhook-config-name={{ include "nmo.webhookConfigName" . }}
            - --webhook-cert-secret-name={{ include "nmo.webhookCertSecretName" . }}
            {{- if .Values.webhook.certPath }}
            - --webhook-cert-path={{ .Values.webhook.certPath }}
            {{- end }}
            {{- end }}
          {{- if .Values.webhook.enabled }}
          ports:
            - containerPort: {{ .Values.webhook.port }}
              name: webhook-server
              protocol: TCP
          {{- end }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.webhook.enabled }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if .Values.webhook.enabled }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

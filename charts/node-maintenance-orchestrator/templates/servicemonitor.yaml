{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "nmo.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "nmo.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: https
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        {{- if .Values.metrics.serviceMonitor.insecureSkipVerify }}
        insecureSkipVerify: true
        {{- else }}
        insecureSkipVerify: false
        serverName: {{ include "nmo.metricsServiceName" . }}.{{ .Release.Namespace }}.svc
        ca:
          secret:
            name: {{ include "nmo.tlsCertSecretName" . }}
            key: ca.crt
        {{- end }}
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- end }}

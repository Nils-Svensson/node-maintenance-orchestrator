{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "nmo.webhookConfigName" . }}
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
webhooks:
  - name: vnodemaintenanceplan.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      # caBundle is intentionally empty — the operator patches it on startup.
      service:
        name: {{ include "nmo.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-maintenance-nmoo-io-v1alpha1-nodemaintenanceplan
    rules:
      - apiGroups: ["maintenance.nmoo.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["nodemaintenanceplans"]
    failurePolicy: Ignore
    sideEffects: None
    timeoutSeconds: 10
{{- end }}

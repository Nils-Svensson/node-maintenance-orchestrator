{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nmo.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nmo.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.metrics.service.port }}
      protocol: TCP
      targetPort: {{ .Values.metrics.service.port }}
  selector:
    {{- include "nmo.selectorLabels" . | nindent 4 }}
{{- end }}
